<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Print News Studio</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Local browser tool</p>
        <h1>Print News Studio</h1>
      </div>
      <div class="top-actions">
        <button id="updateBtn" class="ghost" title="Check for a newer portable version">Check Update</button>
        <button id="installUpdateBtn" class="primary" title="Download and install the newest version" hidden>Update App</button>
        <button id="saveDraftBtn" class="ghost" title="Save this working draft in the browser">Save Draft</button>
        <button id="loadDraftBtn" class="ghost" title="Load last browser draft">Load Draft</button>
        <button id="clearBtn" class="danger" title="Clear the current screen">Clear</button>
        <button id="shutdownBtn" class="danger shutdown-btn" title="Turn off the local app server">Turn Off</button>
      </div>
      <p id="updateStatus" class="status update-status"></p>
    </header>

    <main class="shell">
      <section class="workspace">
        <div class="top-grid">
        <section class="panel paste-panel">
          <div class="panel-head">
            <div>
              <h2>Paste 4 columns</h2>
            </div>
          </div>
          <textarea id="excelPaste" spellcheck="false" placeholder="Date	Number	Title	Link"></textarea>
          <div id="pastePreview" class="paste-preview" hidden></div>
          <div class="paste-actions">
            <button id="parseBtn" class="primary">Create News Sections</button>
            <button id="sampleBtn" class="ghost">Try Sample</button>
            <button id="addEmptyBtn" class="ghost">Add empty list</button>
            <p id="parseStatus" class="status"></p>
          </div>
        </section>

        <section class="panel preview-controls">
          <div class="panel-head">
            <div>
              <h2>Preview and export</h2>
            </div>
          </div>
          <label class="checkline">
            <input id="roundCorners" type="checkbox">
            Rounded PNG corners
          </label>
          <label class="folder-label">
            Location folder
            <div class="folder-row">
              <input id="exportFolderInput" type="text" placeholder="data\exports">
              <button id="saveExportFolderBtn" class="ghost" type="button">Save Folder</button>
              <button id="openExportFolderBtn" class="ghost" type="button">Open Folder</button>
            </div>
          </label>
          <div class="export-actions">
            <button id="pngExportBtn" class="primary">Render PNG List</button>
            <button id="zipExportBtn" class="primary">Render ZIP</button>
          </div>
          <p id="exportStatus" class="status"></p>
        </section>
        </div>

        <section class="panel logo-panel">
          <div class="panel-head">
            <div>
              <h2>Source logos</h2>
            </div>
          </div>
          <div id="logoSummary" class="logo-summary">
            <div class="empty-state compact">Sources appear after you paste news rows.</div>
          </div>
        </section>

        <section class="panel editor-panel">
          <div class="panel-head">
            <div>
              <h2>Edit news list</h2>
              <p class="section-note">Edit your news: If you bold text it will auto highlight, give // to separate Aulacese text.</p>
            </div>
            <label class="color-picker">
              News color
              <select id="newsColorMode">
                <option value="white" selected>All white</option>
                <option value="grey">Light grey</option>
                <option value="cream">Cream</option>
                <option value="white-cream">White + cream</option>
                <option value="white-grey">White + light grey</option>
                <option value="random">Random</option>
              </select>
            </label>
            <div class="font-picker">
              <span>Fonts:</span>
              <label>Aulacese <select id="aulaceseFontSelect"></select></label>
              <span>:</span>
              <label>English <select id="englishFontSelect"></select></label>
              <input id="fontFolderInput" class="font-folder-input" type="text" placeholder="data\fonts">
              <button id="chooseFontFolderBtn" class="ghost" type="button" title="Choose font folder">Choose</button>
              <button id="saveFontFolderBtn" class="ghost" type="button" title="Save font folder">Save</button>
              <button id="openFontFolderBtn" class="ghost" type="button" title="Open font folder">Folder</button>
            </div>
          </div>
          <div id="itemsEmpty" class="empty-state">Paste Excel rows to create news sections.</div>
          <div id="itemsList" class="items-list"></div>
        </section>
      </section>
      <div id="previewList" hidden></div>
    </main>

    <template id="itemTemplate">
      <article class="news-card">
        <div class="number-badge"></div>
        <div class="card-fields">
          <div class="title-input" contenteditable="true" data-placeholder="Title"></div>
          <div class="meta-line">
            <input class="date-input" type="text" placeholder="Date">
            <div class="link-line">
              <input class="link-input" type="text" placeholder="Link">
              <button class="open-link" title="Open link">Open Link</button>
            </div>
            <button class="subtext-toggle" type="button" title="Show or hide sub text"><strong>Sub Text</strong></button>
          </div>
          <div class="subtext-input" contenteditable="true" spellcheck="false" data-placeholder="Sub Text"></div>
        </div>
        <div class="logo-drop" tabindex="0" title="Paste a source logo here">
          <img alt="">
          <span>Paste logo</span>
          <a class="search-logo" target="_blank" rel="noopener">Search Logo</a>
          <strong class="logo-source"></strong>
          <div class="logo-position">
            <span></span>
            <button class="logo-nudge" data-dx="0" data-dy="-4" title="Move logo up">&uarr;</button>
            <span></span>
            <button class="logo-nudge" data-dx="-4" data-dy="0" title="Move logo left">&larr;</button>
            <button class="logo-reset" title="Reset logo position">Reset</button>
            <button class="logo-nudge" data-dx="4" data-dy="0" title="Move logo right">&rarr;</button>
            <button class="logo-size" data-scale="-0.08" title="Make logo smaller">-</button>
            <button class="logo-nudge" data-dx="0" data-dy="4" title="Move logo down">&darr;</button>
            <button class="logo-size" data-scale="0.08" title="Make logo bigger">+</button>
          </div>
        </div>
        <div class="item-preview" aria-label="News preview"></div>
        <button class="remove-item" title="Remove this news section">X</button>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
